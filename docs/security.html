<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security - Red Hat Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Security</h1>
        <p>Harden your infrastructure with SELinux, OpenSCAP, and Identity Management.</p>
    </header>

    <div id="nav-placeholder"></div>

    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search security guides...">
        </div>

        <div class="filter-container" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <select id="difficultyFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Difficulties</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            <select id="topicFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Topics</option>
                <option value="Ansible">Ansible</option>
                <option value="OpenShift">OpenShift</option>
                <option value="RHEL">RHEL</option>
                <option value="Hybrid Cloud">Hybrid Cloud</option>
            </select>
            <select id="typeFilter" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
                <option value="">All Types</option>
                <option value="Article">Article</option>
                <option value="Documentation">Documentation</option>
                <option value="Video">Video</option>
                <option value="Blog">Blog</option>
                <option value="Tool">Tool</option>
            </select>
        </div>


        <div class="grid-container">
            {% for item in site.data.security %}
            <div class="card">
                <h3>{{ item.title }}</h3>
                <div class="tags-container">
                    <span class="tag tag-difficulty">{{ item.difficulty }}</span>
                    <span class="tag tag-topic">{{ item.topic }}</span>
                    <span class="tag tag-type">{{ item.type }}</span>
                </div>
                <p>{{ item.desc }}</p>
                <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer">{{ item.link_text }} &rarr;</a>
            </div>
            {% endfor %}
        </div>
    </main>

    <script src="nav.js"></script>
    <script src="search.js"></script>

</body>
</html>
